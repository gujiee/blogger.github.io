<footer class="bg-light dark:bg-darkmode-light">
  <div class="container">
    <div class="row items-center py-10">
      <div class="lg:col-3 mb-8 text-center lg:mb-0 lg:text-left">
        <!-- navbar brand/logo -->
        <a
          class="navbar-brand inline-block"
          href="{{ site.Home.RelPermalink }}">
          {{/* https://github.com/gethugothemes/hugo-modules/tree/master/images */}}
          {{ partial "logo" }}
        </a>
        <div class="mt-2">
          <a href="https://gujiee.blogspot.com/" target="_blank" rel="noopener" class="inline-flex items-center gap-1.5 text-sm text-text-dark dark:text-white hover:text-primary dark:hover:text-darkmode-primary transition-colors">
            <i class="fab fa-blogger-b"></i>
            <span>Blogger</span>
          </a>
        </div>
      </div>
            <div class="lg:col-6 mb-8 text-center lg:mb-0">
        <ul>
          {{ range site.Menus.footer }}
            <li class="m-3 inline-block">
              <a
                {{ if findRE `^http` .URL }}
                  target="_blank" rel="noopener"
                {{ end }}
                href="{{ if findRE `^#` .URL }}
                  {{ if not $.IsHome }}
                    {{ site.Home.RelPermalink }}
                  {{ end }}{{ .URL }}
                {{ else }}
                  {{ with .Page }}{{ .RelPermalink }}{{ else }}{{ site.Home.RelPermalink | safeURL }}{{ strings.TrimPrefix "/" .URL }}{{ end }}
                {{ end }}"
                >{{ .Name }}</a
              >
            </li>
          {{ end }}
        </ul>
      </div>
      <div class="lg:col-3 mb-8 text-center lg:mb-0 lg:mt-0 lg:text-right">
        <ul class="social-icons">
          {{ range hugo.Data.social.main }}
            <li>
              <a
                style="background-color: {{ .color }}"
                target="_blank"
                aria-label="{{ .name }}"
                rel="nofollow noopener"
                href="{{ .link | safeURL }}">
                <i class="{{ .icon }}"></i>
              </a>
            </li>
          {{ end }}
        </ul>
      </div>
    </div>
  </div>
  <div class="border-border dark:border-darkmode-border border-t py-7">
    <div
      class="text-text-light dark:text-darkmode-text-light container text-center">
      <p>
        {{ T "copyright" | markdownify }}
      </p>
    </div>
  </div>
</footer>
